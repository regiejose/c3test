senior_portal.settings:
  path: '/admin/config/senior-portal/settings'
  defaults:
    _form: '\Drupal\senior_portal\Form\SeniorPortalSettingsForm'
    _title: 'Senior Portal Settings'
  requirements:
    _permission: 'administer site configuration'

senior_portal.page:
  path: '/senior-portal'
  defaults:
    _controller: '\Drupal\senior_portal\Controller\SeniorPortalController::page'
    _title: 'Senior Portal'
  requirements:
    _permission: 'access senior portal'

senior_portal.api:
  path: '/v1/api/portal'
  defaults:
    _controller: '\Drupal\senior_portal\Controller\SeniorPortalController::api'
  requirements:
    _permission: 'access content'

senior_portal.footer_about:
  path: '/v1/api/footer-about'
  defaults:
    _controller: '\Drupal\senior_portal\Controller\SeniorPortalController::footerAbout'
  requirements:
    _permission: 'access content'

senior_portal.footer_menu:
  path: '/v1/api/footer-menu'
  defaults:
    _controller: '\Drupal\senior_portal\Controller\SeniorPortalController::footerMenu'
  requirements:
    _permission: 'access content'

senior_portal.jwt_generate:
  path: '/v1/api/jwt/generate'
  defaults:
    _controller: '\Drupal\senior_portal\Controller\JwtController::generate'
    _title: 'Generate JWT'
  methods: [POST]
  requirements:
    _permission: 'access content'