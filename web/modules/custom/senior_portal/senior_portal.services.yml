services:
  senior_portal.api_service:
    class: Drupal\senior_portal\Service\ApiService
    arguments:
      - '@http_client'
      - '@config.factory'
      - '@cache.default'
      - '@logger.factory'
  senior_portal.senior_portal_page_subscriber:
    class: Drupal\senior_portal\EventSubscriber\SeniorPortalSubscriber
    arguments: ['@logger.factory']
    tags:
      - { name: event_subscriber }